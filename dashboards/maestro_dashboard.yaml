# E3DC Maestro – Dashboard
# Voraussetzungen: mushroom-cards (HACS → Frontend)
# Generiert von scripts/write_dashboard.py

title: E3DC Maestro
views:

  - title: Dashboard
    icon: mdi:view-dashboard
    path: uebersicht
    cards:

      - type: custom:mushroom-title-card
        title: E3DC Maestro
        subtitle: Echtzeit-Übersicht

      - type: custom:mushroom-chips-card
        chips:
          - type: template
            content: Regelung
            icon: mdi:power
            icon_color: "{{ 'green' if is_state('switch.e3dc_maestro_regelung_aktiv', 'on') else 'red' }}"
            entity: switch.e3dc_maestro_regelung_aktiv
            tap_action:
              action: toggle
          - type: template
            content: Entladung
            icon: mdi:battery-arrow-down
            icon_color: "{{ 'orange' if is_state('switch.e3dc_maestro_erzwungene_entladung', 'on') else 'grey' }}"
            entity: switch.e3dc_maestro_erzwungene_entladung
            tap_action:
              action: toggle
            hold_action:
              action: more-info
          - type: template
            content: E3DC
            icon: mdi:check-network
            icon_color: "{{ 'green' if is_state('binary_sensor.e3dc_maestro_e3dc_erreichbar', 'on') else 'red' }}"
            entity: binary_sensor.e3dc_maestro_e3dc_erreichbar
            tap_action:
              action: more-info
          - type: template
            content: Notfall
            icon: mdi:battery-alert
            icon_color: "{{ 'red' if is_state('binary_sensor.e3dc_maestro_notfallladung_aktiv', 'on') else 'grey' }}"
            entity: binary_sensor.e3dc_maestro_notfallladung_aktiv
            tap_action:
              action: more-info
          - type: template
            content: Abregelschutz
            icon: mdi:shield-alert
            icon_color: "{{ 'amber' if is_state('binary_sensor.e3dc_maestro_abregelschutz_aktiv', 'on') else 'grey' }}"
            entity: binary_sensor.e3dc_maestro_abregelschutz_aktiv
            tap_action:
              action: more-info
          - type: template
            content: HT-Schutz
            icon: mdi:clock-alert
            icon_color: "{{ 'deep-orange' if is_state('binary_sensor.e3dc_maestro_ht_schutz_aktiv', 'on') else 'grey' }}"
            entity: binary_sensor.e3dc_maestro_ht_schutz_aktiv
            tap_action:
              action: more-info
          - type: template
            content: Drosselung
            icon: mdi:transmission-tower-off
            icon_color: "{{ 'orange' if is_state('binary_sensor.e3dc_maestro_einspeisedrosselung_aktiv', 'on') else 'grey' }}"
            entity: binary_sensor.e3dc_maestro_einspeisedrosselung_aktiv
            tap_action:
              action: more-info
          - type: template
            content: >-
              {% set v = states('sensor.e3dc_maestro_aktives_lade_limit') %}
              {%- if is_state('binary_sensor.e3dc_maestro_ladesperre_aktiv', 'on') and v not in ('unknown','unavailable') -%}
                Ladesperre {{ v }} W
              {%- else -%}
                Ladesperre
              {%- endif %}
            icon: mdi:battery-lock
            icon_color: "{{ 'red' if is_state('binary_sensor.e3dc_maestro_ladesperre_aktiv', 'on') else 'grey' }}"
            entity: binary_sensor.e3dc_maestro_ladesperre_aktiv
            tap_action:
              action: more-info
          - type: template
            content: >-
              {% set v = states('sensor.e3dc_maestro_aktives_entlade_limit') %}
              {%- if is_state('binary_sensor.e3dc_maestro_entladesperre_aktiv', 'on') and v not in ('unknown','unavailable') -%}
                Entladesperre {{ v }} W
              {%- else -%}
                Entladesperre
              {%- endif %}
            icon: mdi:battery-off-outline
            icon_color: "{{ 'red' if is_state('binary_sensor.e3dc_maestro_entladesperre_aktiv', 'on') else 'grey' }}"
            entity: binary_sensor.e3dc_maestro_entladesperre_aktiv
            tap_action:
              action: more-info

      - type: custom:mushroom-template-card
        primary: "{{ states('sensor.e3dc_maestro_regelphase') }}"
        secondary: Aktuelle Regelphase
        icon: mdi:state-machine
        icon_color: >
          {% set p = states('sensor.e3dc_maestro_regelphase') %}
          {% if p == 'emergency' %} red
          {% elif p == 'feed_in_limit' %} orange
          {% elif p == 'force_discharge' %} deep-orange
          {% elif p == 'corridor' %} green
          {% elif p == 'spreading' %} teal
          {% elif p == 'curtailment_guard' %} amber
          {% elif p == 'ht_protection' %} deep-orange
          {% elif p == 'reserve_protection' %} blue
          {% elif p == 'evcc_pause' %} purple
          {% elif p == 'pv_delay' %} light-green
          {% else %} grey
          {% endif %}
        layout: horizontal
        tap_action:
          action: more-info
          entity: sensor.e3dc_maestro_regelphase

      - type: custom:mushroom-entity-card
        entity: sensor.e3dc_maestro_letzte_aktion
        name: Letzte Aktion
        icon: mdi:history
        icon_color: blue-grey
        layout: horizontal
        tap_action:
          action: more-info

      - type: vertical-stack
        cards:
          - type: entities
            title: Manuelle Steuerung
            show_header_toggle: false
            entities:
              - entity: switch.e3dc_maestro_regelung_aktiv
                name: "Regelung aktiv"
              - entity: switch.e3dc_maestro_erzwungene_entladung
                name: "Erzwungene Entladung"
                secondary_info: last-changed
          - type: custom:mushroom-number-card
            entity: number.e3dc_maestro_erzwungene_entladungsleistung
            name: Entladeleistung
            icon: mdi:battery-arrow-down
            display_mode: slider
            layout: horizontal

      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:mushroom-entity-card
            entity: sensor.e3dc_maestro_ziel_ladeleistung
            name: Ziel-Ladeleistung
            icon: mdi:lightning-bolt
            icon_color: orange
            tap_action:
              action: more-info
          - type: custom:mushroom-entity-card
            entity: sensor.e3dc_maestro_ziel_soc
            name: Ziel-SoC
            icon: mdi:battery-charging
            icon_color: green
            tap_action:
              action: more-info
          - type: custom:mushroom-entity-card
            entity: sensor.e3dc_maestro_autonomiezeit
            name: Autonomiezeit
            icon: mdi:timer-outline
            icon_color: blue
            tap_action:
              action: more-info
          - type: custom:mushroom-entity-card
            entity: sensor.e3dc_maestro_saisonales_ladeende_stunde
            name: Ladeende heute
            icon: mdi:clock-end
            icon_color: purple
            tap_action:
              action: more-info

      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:mushroom-entity-card
            entity: sensor.e3dc_maestro_geladen_heute
            name: Geladen heute
            icon: mdi:battery-plus
            icon_color: green
            tap_action:
              action: more-info
          - type: custom:mushroom-entity-card
            entity: sensor.e3dc_maestro_entladen_heute
            name: Entladen heute
            icon: mdi:battery-minus
            icon_color: deep-orange
            tap_action:
              action: more-info
          - type: custom:mushroom-entity-card
            entity: sensor.e3dc_maestro_einspeiselimit_gesichert_heute
            name: Einspeiselimit gesichert
            icon: mdi:shield-check
            icon_color: teal
            tap_action:
              action: more-info
          - type: custom:mushroom-entity-card
            entity: sensor.e3dc_maestro_einspeise_eingriffe_heute
            name: Einspeise-Eingriffe
            icon: mdi:transmission-tower
            icon_color: indigo
            tap_action:
              action: more-info

      - type: vertical-stack
        cards:
          - type: custom:mushroom-title-card
            title: Morgen-Prognose
            subtitle: Vorausschauendes Laden & PV-Erwartung
          - type: grid
            columns: 3
            square: false
            cards:
              - type: custom:mushroom-template-card
                primary: >
                  {{ states('sensor.e3dc_maestro_vorausschauendes_ladeziel') | default('–') }} %
                secondary: Ladeziel morgen
                icon: mdi:battery-charging-high
                icon_color: >
                  {% set v = states('sensor.e3dc_maestro_vorausschauendes_ladeziel') | float(-1) %}
                  {% if v < 0 %} grey
                  {% elif v >= 90 %} red
                  {% elif v >= 75 %} orange
                  {% else %} green
                  {% endif %}
                layout: vertical
                tap_action:
                  action: more-info
                  entity: sensor.e3dc_maestro_vorausschauendes_ladeziel
              - type: custom:mushroom-template-card
                primary: >
                  {{ states('sensor.e3dc_maestro_morgen_pv_prognose') | default('–') }} kWh
                secondary: PV morgen
                icon: mdi:weather-sunny
                icon_color: >
                  {% set v = states('sensor.e3dc_maestro_morgen_pv_prognose') | float(-1) %}
                  {% if v < 0 %} grey
                  {% elif v >= 10 %} green
                  {% elif v >= 5 %} amber
                  {% else %} red
                  {% endif %}
                layout: vertical
                tap_action:
                  action: more-info
                  entity: sensor.e3dc_maestro_morgen_pv_prognose
              - type: custom:mushroom-template-card
                primary: >
                  {{ states('sensor.e3dc_maestro_morgen_energiedefizit') | default('–') }} kWh
                secondary: Defizit morgen
                icon: >
                  {% if states('sensor.e3dc_maestro_morgen_energiedefizit') | float(0) > 0 %}
                    mdi:transmission-tower-import
                  {% else %}
                    mdi:check-circle
                  {% endif %}
                icon_color: >
                  {% set v = states('sensor.e3dc_maestro_morgen_energiedefizit') | float(-1) %}
                  {% if v < 0 %} grey
                  {% elif v == 0 %} green
                  {% elif v < 3 %} amber
                  {% else %} red
                  {% endif %}
                layout: vertical
                tap_action:
                  action: more-info
                  entity: sensor.e3dc_maestro_morgen_energiedefizit

      - type: history-graph
        title: Regelphase (24 h)
        hours_to_show: 24
        entities:
          - entity: sensor.e3dc_maestro_regelphase
            name: Phase

      - type: history-graph
        title: Tagesstatistik (24 h)
        hours_to_show: 24
        entities:
          - entity: sensor.e3dc_maestro_geladen_heute
            name: Geladen (kWh)
          - entity: sensor.e3dc_maestro_entladen_heute
            name: Entladen (kWh)
          - entity: sensor.e3dc_maestro_einspeiselimit_gesichert_heute
            name: Einspeiselimit gesichert (kWh)

      - type: custom:mushroom-title-card
        title: 24h SoC-Prognose
        subtitle: "Benötigt aktivierten Forecast-Sensor (min. 7 Tage Verbrauchsdaten)"

      - type: custom:mushroom-chips-card
        chips:
          - type: template
            content: >
              Min: {{ state_attr('sensor.e3dc_maestro_forecast_soc_trajektorie_24h', 'min_soc') | default('–') }} %
            icon: mdi:battery-arrow-down-outline
            icon_color: orange
          - type: template
            content: >
              Max: {{ state_attr('sensor.e3dc_maestro_forecast_soc_trajektorie_24h', 'max_soc') | default('–') }} %
            icon: mdi:battery-arrow-up-outline
            icon_color: green
          - type: template
            content: >
              Grid: {{ state_attr('sensor.e3dc_maestro_forecast_soc_trajektorie_24h', 'grid_draw_kwh') | default('–') }} kWh
            icon: mdi:transmission-tower-import
            icon_color: red
          - type: template
            content: >
              Autarkie: {{ state_attr('sensor.e3dc_maestro_forecast_soc_trajektorie_24h', 'self_sufficiency_pct') | default('–') }} %
            icon: mdi:solar-panel
            icon_color: amber

      - type: custom:apexcharts-card
        chart_type: line
        graph_span: 24h
        span:
          start: hour
          offset: +1h
        header:
          title: Prognose SoC nächste 24h
          show: true
        apex_config:
          chart:
            height: 200
          yaxis:
            min: 0
            max: 100
          xaxis:
            type: datetime
            labels:
              datetimeUTC: false
              format: HH:mm
        series:
          - entity: sensor.e3dc_maestro_forecast_soc_trajektorie_24h
            name: SoC-Prognose
            unit: "%"
            data_generator: |
              return entity.attributes.trajectory_points || [];

  - title: Laden
    icon: mdi:battery-charging-outline
    path: laden
    cards:

      - type: custom:mushroom-title-card
        title: Ladestrategie & Optimierung

      - type: custom:mushroom-chips-card
        chips:
          - type: template
            content: Abregelschutz
            icon: mdi:shield
            icon_color: "{{ 'amber' if is_state('switch.e3dc_maestro_abregelschutz', 'on') else 'grey' }}"
            entity: switch.e3dc_maestro_abregelschutz
            tap_action:
              action: toggle
          - type: template
            content: Spreading
            icon: mdi:chart-timeline-variant
            icon_color: "{{ 'teal' if is_state('switch.e3dc_maestro_ladeverteilung_spreading', 'on') else 'grey' }}"
            entity: switch.e3dc_maestro_ladeverteilung_spreading
            tap_action:
              action: toggle
          - type: template
            content: Korridor-Pause
            icon: mdi:pause-circle
            icon_color: "{{ 'blue' if is_state('switch.e3dc_maestro_korridor_pause_min_ladeleistung', 'on') else 'grey' }}"
            entity: switch.e3dc_maestro_korridor_pause_min_ladeleistung
            tap_action:
              action: toggle
          - type: template
            content: Two-Tier
            icon: mdi:sort-clock-descending
            icon_color: "{{ 'purple' if is_state('switch.e3dc_maestro_spat_ladung_two_tier', 'on') else 'grey' }}"
            entity: switch.e3dc_maestro_spat_ladung_two_tier
            tap_action:
              action: toggle
          - type: template
            content: Notstromreserve
            icon: mdi:battery-heart
            icon_color: "{{ 'green' if is_state('switch.e3dc_maestro_saisonale_notstromreserve', 'on') else 'grey' }}"
            entity: switch.e3dc_maestro_saisonale_notstromreserve
            tap_action:
              action: toggle

      - type: entities
        title: Ladekorridor
        subtitle: Saisonale SoC-Rampe bis zum Tagesziel
        entities:
          - entity: number.e3dc_maestro_ladeschwelle
            name: "Ladeschwelle / Notfall (%)"
          - entity: number.e3dc_maestro_ladeende_soc
            name: "Ladeende SoC (%)"
          - entity: number.e3dc_maestro_ladeende_winter
            name: "Ladeende Winter (Stunde, lokal) — nur ohne Astro"
          - entity: number.e3dc_maestro_ladeende_sommer
            name: "Ladeende Sommer (Stunde, lokal) — nur ohne Astro"
          - entity: number.e3dc_maestro_sommerladeende_ziel
            name: "Ziel-Ladeende Sommer (Stunde, lokal)"
          - type: button
            name: "ℹ️  Hilfe zu diesem Abschnitt"
            icon: mdi:help-circle-outline
            tap_action:
              action: navigate
              navigation_path: /e3dc-maestro/help-ladekorridor

      - type: entities
        title: Ladeverteilung (Spreading)
        entities:
          - entity: switch.e3dc_maestro_ladeverteilung_spreading
            name: Spreading aktiv
          - entity: number.e3dc_maestro_spreading_ziel_soc
            name: "Spreading-Ziel SoC (%)"
          - type: button
            name: "ℹ️  Hilfe zu diesem Abschnitt"
            icon: mdi:help-circle-outline
            tap_action:
              action: navigate
              navigation_path: /e3dc-maestro/help-spreading

      - type: entities
        title: Abregelschutz (Curtailment Guard)
        entities:
          - entity: switch.e3dc_maestro_abregelschutz
            name: Abregelschutz aktiv
          - entity: binary_sensor.e3dc_maestro_abregelschutz_aktiv
            name: Aktuell aktiv
          - entity: number.e3dc_maestro_abregelschutz_einschaltschwelle
            name: "Einschaltschwelle (W)"
          - entity: number.e3dc_maestro_abregelschutz_ausschaltschwelle
            name: "Ausschaltschwelle (W)"
          - type: button
            name: "ℹ️  Hilfe zu diesem Abschnitt"
            icon: mdi:help-circle-outline
            tap_action:
              action: navigate
              navigation_path: /e3dc-maestro/help-curtailment

      - type: entities
        title: Spät-Ladung (Two-Tier)
        entities:
          - entity: switch.e3dc_maestro_spat_ladung_two_tier
            name: Spät-Ladung aktiv
          - entity: number.e3dc_maestro_spatziel_soc
            name: "Spätziel SoC (%)"
          - entity: number.e3dc_maestro_spat_ladeende_stunde
            name: "Spät-Ladeende (Stunde, lokal)"
          - type: button
            name: "ℹ️  Hilfe zu diesem Abschnitt"
            icon: mdi:help-circle-outline
            tap_action:
              action: navigate
              navigation_path: /e3dc-maestro/help-two-tier

  - title: Zeitplanung
    icon: mdi:calendar-clock
    path: zeitplanung
    cards:

      - type: custom:mushroom-title-card
        title: Saisonales Ladeende & Astro-Modus

      - type: grid
        columns: 2
        square: false
        cards:
          - type: custom:mushroom-entity-card
            entity: sensor.e3dc_maestro_saisonales_ladeende_stunde
            name: Ladeende heute
            icon: mdi:clock-end
            icon_color: purple
            layout: vertical
            tap_action:
              action: more-info
          - type: custom:mushroom-entity-card
            entity: sensor.e3dc_maestro_astro_ladestart_uhrzeit
            name: Ladestart heute
            icon: mdi:clock-start
            icon_color: amber
            layout: vertical
            tap_action:
              action: more-info
          - type: custom:mushroom-entity-card
            entity: sensor.e3dc_maestro_ladeende_morgen_prognose
            name: Ladeende morgen
            icon: mdi:clock-end
            icon_color: deep-purple
            layout: vertical
            tap_action:
              action: more-info
          - type: custom:mushroom-entity-card
            entity: sensor.e3dc_maestro_ladestart_morgen_prognose
            name: Ladestart morgen
            icon: mdi:clock-start
            icon_color: orange
            layout: vertical
            tap_action:
              action: more-info

      - type: entities
        title: Astro-Modus (Phase 7)
        entities:
          - entity: switch.e3dc_maestro_astro_modus_sonnenuberwachung
            name: Astro-Modus aktiv
          - entity: number.e3dc_maestro_ladeende_offset_zu_sonnenuntergang
            name: "Offset zu Sonnenuntergang (h)"
          - entity: number.e3dc_maestro_ladestart_offset_nach_sonnenaufgang
            name: "Offset nach Sonnenaufgang (h)"
          - type: button
            name: "ℹ️  Hilfe zu diesem Abschnitt"
            icon: mdi:help-circle-outline
            tap_action:
              action: navigate
              navigation_path: /e3dc-maestro/help-astro

      - type: markdown
        content: >
          **Standort:** Wird automatisch aus den Home Assistant Systemeinstellungen
          übernommen (*Einstellungen → System → Allgemein*).

  - title: Netz & Tarif
    icon: mdi:transmission-tower
    path: tarif
    cards:

      - type: custom:mushroom-title-card
        title: HT/NT-Schutz & Dynamischer Tarif

      - type: custom:mushroom-chips-card
        chips:
          - type: template
            content: HT/NT-Schutz
            icon: mdi:clock-alert
            icon_color: "{{ 'deep-orange' if is_state('switch.e3dc_maestro_ht_nt_schutz', 'on') else 'grey' }}"
            entity: switch.e3dc_maestro_ht_nt_schutz
            tap_action:
              action: toggle
          - type: template
            content: HT aktiv
            icon: mdi:clock-check
            icon_color: "{{ 'red' if is_state('binary_sensor.e3dc_maestro_ht_schutz_aktiv', 'on') else 'grey' }}"
            entity: binary_sensor.e3dc_maestro_ht_schutz_aktiv
            tap_action:
              action: more-info

      - type: entities
        title: Hochtarif-Schutz
        entities:
          - entity: switch.e3dc_maestro_ht_nt_schutz
            name: HT/NT-Schutz aktiv
          - entity: switch.e3dc_maestro_ht_samstag
            name: Samstag wie HT
          - entity: switch.e3dc_maestro_ht_sonntag
            name: Sonntag wie HT
          - entity: binary_sensor.e3dc_maestro_ht_schutz_aktiv
            name: HT-Schutz – aktuell aktiv
          - entity: number.e3dc_maestro_ht_beginn
            name: "HT Beginn (Stunde, lokal)"
          - entity: number.e3dc_maestro_ht_ende
            name: "HT Ende (Stunde, lokal)"
          - entity: number.e3dc_maestro_ht_reserve_winter
            name: "HT-Reserve Winter (%)"
          - entity: number.e3dc_maestro_ht_sockel_aquinoktium
            name: "HT-Reserve Äquinoktium (%)"
          - type: button
            name: "ℹ️  Hilfe zu diesem Abschnitt"
            icon: mdi:help-circle-outline
            tap_action:
              action: navigate
              navigation_path: /e3dc-maestro/help-ht

      - type: entities
        title: Dynamischer Tarif
        subtitle: Netzladung bei günstigem Preis
        entities:
          - entity: number.e3dc_maestro_gunstig_schwelle
            name: "Günstig-Schwelle (€/kWh)"
          - entity: number.e3dc_maestro_max_netzladung_tag
            name: "Max. Netzladung/Tag (kWh)"
          - type: button
            name: "ℹ️  Hilfe zu diesem Abschnitt"
            icon: mdi:help-circle-outline
            tap_action:
              action: navigate
              navigation_path: /e3dc-maestro/help-tarif

      - type: entities
        title: Tarif-Slots
        subtitle: Flexible Tarif-Fenster – via Options Flow konfigurieren
        entities:
          - entity: switch.e3dc_maestro_ht_nt_schutz
            name: HT-Schutz aktiv (Legacy-Schnellzugriff)
          - entity: binary_sensor.e3dc_maestro_ht_schutz_aktiv
            name: HT-Schutz aktuell aktiv
          - type: button
            name: "ℹ️  Hilfe zu diesem Abschnitt"
            icon: mdi:help-circle-outline
            tap_action:
              action: navigate
              navigation_path: /e3dc-maestro/help-tariff-slots

      - type: markdown
        content: >
          **Tarif-Slots konfigurieren:** Über *Einstellungen → Integrationen →
          E3DC Maestro → Konfigurieren → Tarif-Slots* lassen sich beliebig viele
          Fenster (Wochentage, Uhrzeit, Klasse) anlegen.
          Klassen: `high` = kein Entladen, `low` = Netzladung erlaubt, `normal` = neutral.

  - title: Flexibilität
    icon: mdi:home-lightning-bolt
    path: flexibilitaet
    cards:

      - type: custom:mushroom-title-card
        title: Wallbox, Wärmepumpe & Vorentladung

      - type: custom:mushroom-chips-card
        chips:
          - type: template
            content: EVCC
            icon: mdi:ev-plug-type2
            icon_color: "{{ 'purple' if is_state('switch.e3dc_maestro_evcc_integration', 'on') else 'grey' }}"
            entity: switch.e3dc_maestro_evcc_integration
            tap_action:
              action: toggle
          - type: template
            content: Wallbox
            icon: mdi:car-electric
